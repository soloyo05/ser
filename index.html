<body>

<div id="buscador">
  <button id="toggleSidebarBtn" class="floating-btn hidden">📺 Lista de canales</button>

<div id="reloadIndicator" style="display: none;">

<div id="listButtons" class="ui-overlay"></div>

<div id="hlsIndicator" class="hls-indicator">HLS Activado</div>

<div id="channelModal">
  <video id="modalVideo" controls autoplay playsinline></video>

  <select id="listaSelector" tabindex="0" class="ui-overlay" style="position: absolute; display: none; top: 2px; left: 4px; z-index: 999; font-size: 12px; padding: 0px; background: #000000; color: #87ff58; border: solid 2px red; border-radius: 4px;"></select>

  <div id="sidebar">
    <div id="sidebarList"></div>
  </div>

  <div id="controlHelpOverlay" class="hidden-ui">
    <input type="text" id="sidebarSearchInput" placeholder="Buscar canal..." class="ui-overlay" />
    🔴 Cerrar | 🟢 Abrir Buscador | 🟡 Siguiente | 🔵 Anterior | 0 Cambia Lista de Canales
  </div>

  <div id="currentChannelInfo" class="hidden-ui">
    <span id="prevChannelInfo">Anterior: Ningún canal</span>
    <span id="currentChannelLabel">Estas viendo: Ningún canal</span>
    <span id="nextChannelInfo">Siguiente: Ningún canal</span>
  </div>
</div>

<script>
// ==================== CONFIGURACIÓN DE WORKER ====================
// CAMBIA ESTA URL por la de tu Worker de Cloudflare
const WORKER_URL = 'https://worker.soloyonadamas7.workers.dev';

// Las listas se cargarán desde el Worker (NO están en el código)
let listasDisponibles = {};

// ==================== VARIABLES GLOBALES ====================
let hls = null;
let isHLSActive = false;
const CONVERT_TS_TO_M3U8 = true;
let conversionStats = { total: 0, tsToM3u8: 0, addedLive: 0, addedM3u8: 0, addedLiveAndM3u8: 0 };

// ==================== CARGAR LISTAS ====================
async function cargarListasDesdeWorker() {
  try {
    console.log('🔐 Cargando listas desde Worker seguro...');
    const response = await fetch(`${WORKER_URL}/listas`);
    if (!response.ok) throw new Error('Error al conectar con el Worker');
    listasDisponibles = await response.json();
    console.log('✅ Listas cargadas:', Object.keys(listasDisponibles).length, 'listas');
    console.log('📋 Nombres:', Object.keys(listasDisponibles).join(', '));
    return true;
  } catch (error) {
    console.error('❌ Error al cargar listas:', error);
    return false;
  }
}

// ==================== FUNCIÓN PARA CONVERTIR URLs ====================
function convertToOptimalFormat(url) {
  if (!CONVERT_TS_TO_M3U8) return { url: url, wasConverted: false, conversionType: 'none' };
  
  let convertedUrl = url;
  let conversionType = 'none';
  
  const urlPattern = /^(https?:\/\/[^\/]+)(:\d+)?(\/.*)?$/;
  const match = url.match(urlPattern);
  
  if (!match) return { url: url, wasConverted: false, conversionType: 'none' };
  
  const baseUrl = match[1] + (match[2] || '');
  let path = match[3] || '';
  
  if (path && !path.includes('/live/') && !path.match(/\.(m3u8|ts|mp4|avi|mkv)$/)) {
    if (path.startsWith('/')) {
      path = '/live' + path;
    } else {
      path = '/live/' + path;
    }
    conversionType = 'addedLive';
  }
  
  if (path && !path.match(/\.(m3u8|ts|mp4|avi|mkv)$/)) {
    if (path.match(/\/(\d+)$/)) {
      path += '.m3u8';
      conversionType = conversionType === 'addedLive' ? 'addedLiveAndM3u8' : 'addedM3u8';
    }
  }
  
  if (path && path.match(/\.ts(\?.*)?$/)) {
    path = path.replace(/\.ts(\?.*)?$/, '.m3u8$1');
    conversionType = conversionType !== 'none' ? conversionType : 'tsToM3u8';
  }
  
  convertedUrl = baseUrl + path;
  const wasConverted = convertedUrl !== url;
  
  if (wasConverted) {
    console.log(`🔄 URL convertida [${conversionType}]: ${url} → ${convertedUrl}`);
  }
  
  return { url: convertedUrl, wasConverted, conversionType };
}

// ==================== FUNCIÓN PARA LIMPIAR REPRODUCTOR ====================
function cleanPlayer() {
  if (hls) {
    hls.stopLoad();
    hls.detachMedia();
    hls.destroy();
    hls = null;
    isHLSActive = false;
  }

  if (modalVideo) {
    modalVideo.pause();
    modalVideo.removeAttribute('src');
    modalVideo.load();
    
    const newVideo = modalVideo.cloneNode(true);
    if (modalVideo && modalVideo.parentNode) {
      modalVideo.parentNode.replaceChild(newVideo, modalVideo);
    }
    window.modalVideo = newVideo;
  }

  if (retryTimeout) clearTimeout(retryTimeout);
  retryCount = 0;
}

// ==================== INDICADORES ====================
function showHLSIndicator() {
  const indicator = document.getElementById('hlsIndicator');
  if (indicator) {
    indicator.style.display = 'block';
    setTimeout(() => { indicator.style.display = 'none'; }, 3000);
  }
}

function showConversionCounter() {
  const counter = document.getElementById('conversionCounter');
  if (counter && conversionStats.total > 0) {
    counter.textContent = `🔄 Convertidos: ${conversionStats.total} canales`;
    counter.style.display = 'block';
    setTimeout(() => { counter.style.display = 'none'; }, 5000);
  }
}

// ==================== CONFIGURAR HLS.js ====================
function setupHLS(videoElement, url) {
  if (hls) {
    hls.stopLoad();
    hls.detachMedia();
    hls.destroy();
    hls = null;
    isHLSActive = false;
  }

  if (Hls.isSupported()) {
    hls = new Hls({
      debug: false,
      enableWorker: true,
      lowLatencyMode: false,
      backBufferLength: 90,
      maxBufferLength: 30,
      maxMaxBufferLength: 600,
      liveSyncDurationCount: 3,
      liveMaxLatencyDurationCount: 10,
      manifestLoadingTimeOut: 15000,
      manifestLoadingMaxRetry: 4,
      levelLoadingTimeOut: 15000,
      levelLoadingMaxRetry: 4,
      fragLoadingTimeOut: 30000,
      fragLoadingMaxRetry: 6,
      startLevel: -1,
      autoStartLoad: true,
      startPosition: -1
    });

    hls.loadSource(url);
    hls.attachMedia(videoElement);

    hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
      console.log('✅ HLS: Manifest cargado, niveles:', data.levels);
      isHLSActive = true;
      videoElement.play().catch(err => console.warn('Autoplay bloqueado:', err));
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
      console.error('❌ Error HLS:', data);
      
      if (data.fatal) {
        switch(data.type) {
          case Hls.ErrorTypes.NETWORK_ERROR:
            console.log('🔄 HLS: Error de red, reintentando...');
            hls.startLoad();
            break;
          case Hls.ErrorTypes.MEDIA_ERROR:
            console.log('🔄 HLS: Error de media, recuperando...');
            hls.recoverMediaError();
            break;
          default:
            console.log('💥 HLS: Error fatal, usando reproducción nativa');
            hls.destroy();
            hls = null;
            isHLSActive = false;
            videoElement.src = url;
            videoElement.load();
            videoElement.play().catch(err => console.warn('Fallback play error:', err));
            break;
        }
      }
    });

    return true;
  } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
    console.log('📱 Usando HLS nativo (Safari)');
    videoElement.src = url;
    videoElement.addEventListener('loadedmetadata', function() {
      videoElement.play().catch(err => console.warn('Autoplay bloqueado:', err));
    });
    return true;
  }
  
  return false;
}

// ==================== REPRODUCIR STREAM ====================
function playStreamWithHLS(streamUrl) {
  const conversionResult = convertToOptimalFormat(streamUrl);
  const finalUrl = conversionResult.url;
  
  if (conversionResult.wasConverted) {
    showHLSIndicator();
  }
  
  console.log('🎬 Reproduciendo:', finalUrl);
  
  if (finalUrl.includes('.m3u8') || finalUrl.includes('.ts') || 
      finalUrl.includes('/live/') || finalUrl.match(/:\d+\//)) {
    
    if (setupHLS(modalVideo, finalUrl)) {
      console.log('✅ Reproduciendo con HLS.js');
      return;
    }
  }
  
  console.log('📺 Usando reproducción nativa');
  modalVideo.src = finalUrl;
  modalVideo.load();
  modalVideo.play().catch(err => console.warn('Autoplay bloqueado:', err));
}

// ==================== VARIABLES DE CONTROL ====================
let retryTimeout = null;
let retryCount = 0;
const MAX_RETRIES = 3;
let channels = [];
let playingChannelIndex = -1;
let selectedChannelIndex = 0;
let inactivityTimeout = null;
let uiTimeout = null;
const sidebar = document.getElementById('sidebar');
const sidebarList = document.getElementById('sidebarList');
const searchInput = document.getElementById('sidebarSearchInput');
let modalVideo = document.getElementById('modalVideo');

// ==================== DETECTAR DISPOSITIVO ====================
function detectarDispositivo() {
  const ua = navigator.userAgent;
  if (/LG Browser|Web0S|NetCast/i.test(ua)) return "LG";
  if (/Android TV|GoogleTV|AFT|SmartTV|Android.*TV/i.test(ua)) return "AndroidTV";
  if (/Android/i.test(ua)) return "Android";
  return "Otro";
}

// ==================== PARSEAR LISTAS M3U ====================
function parseM3U(text) {
  const lines = text.split('\n');
  const canales = [];
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('#EXTINF')) {
      const nombre = lines[i].split(',').pop().trim();
      const stream = lines[i + 1]?.trim();
      if (stream && stream.startsWith('http')) {
        const conversionResult = convertToOptimalFormat(stream);
        canales.push({ 
          nombre, 
          stream: conversionResult.url,
          originalStream: stream,
          wasConverted: conversionResult.wasConverted,
          conversionType: conversionResult.conversionType
        });
        
        if (conversionResult.wasConverted) {
          conversionStats.total++;
          switch(conversionResult.conversionType) {
            case 'tsToM3u8': conversionStats.tsToM3u8++; break;
            case 'addedLive': conversionStats.addedLive++; break;
            case 'addedM3u8': conversionStats.addedM3u8++; break;
            case 'addedLiveAndM3u8': conversionStats.addedLiveAndM3u8++; break;
          }
        }
      }
    }
  }
  return canales;
}

// ==================== CARGAR CANALES ====================
async function loadChannelsAuto(url) {
  try {
    channels = [];
    sidebarList.innerHTML = '';
    
    const response = await fetch(url);
    const text = await response.text();
    
    if (text.includes('#EXTINF')) {
      channels = parseM3U(text);
    } else {
      console.error("Formato de lista no reconocido.");
      return;
    }
    
    const dispositivo = detectarDispositivo();
    if (dispositivo === 'LG') {
      channels = channels.filter(channel => !channel.nombre.includes('FHD'));
    }
    
    renderChannels(channels);
    updateChannelFocus();
    
    modalVideo = document.getElementById('modalVideo');
    
    console.log(`✅ Lista cargada: ${channels.length} canales`);
    console.log('📊 Estadísticas de conversión:', conversionStats);
  } catch (error) {
    console.error('Error al cargar los canales:', error);
  }
}

// ==================== RENDERIZAR CANALES ====================
function renderChannels(channelsArray) {
  sidebarList.innerHTML = '';
  
  if (channelsArray.length === 0) {
    sidebarList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No se encontraron canales</div>';
    return;
  }
  
  channelsArray.forEach((channel, index) => {
    const item = document.createElement('div');
    item.classList.add('channel-item');
    
    if (channel.wasConverted) {
      item.classList.add('converted');
    }
    
    let displayText = channel.nombre;
    if (channel.wasConverted) {
      let badge = '';
      switch(channel.conversionType) {
        case 'addedLiveAndM3u8': badge = '🔧 Live+M3U8'; break;
        case 'addedLive': badge = '🔧 Live'; break;
        case 'addedM3u8': badge = '🔧 M3U8'; break;
        case 'tsToM3u8': badge = '🔄 M3U8'; break;
      }
      displayText += ` <span class="conversion-badge">${badge}</span>`;
    }
    
    item.innerHTML = displayText;
    item.setAttribute('data-index', index);
    item.setAttribute('tabindex', 0);
    item.addEventListener('click', () => {
      selectedChannelIndex = index;
      activateChannel();
    });
    item.addEventListener('focus', () => {
      selectedChannelIndex = index;
    });
    sidebarList.appendChild(item);
  });
  updateChannelFocus();
}

// ==================== ACTUALIZAR FOCO ====================
function updateChannelFocus() {
  const activeElement = document.activeElement;
  const isTyping = activeElement === searchInput;
  const items = document.querySelectorAll('.channel-item');
  items.forEach(item => item.classList.remove('active'));
  const activeItem = document.querySelector(`.channel-item[data-index='${selectedChannelIndex}']`);
  if (activeItem) {
    activeItem.classList.add('active');
    activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (!isTyping) {
      activeItem.focus({ preventScroll: true });
    }
  }
}

// ==================== ACTIVAR CANAL ====================
function activateChannel() {
  const canal = channels[selectedChannelIndex];
  if (!canal) return;

  playingChannelIndex = selectedChannelIndex;
  localStorage.setItem('ultimoCanalIndex', selectedChannelIndex);
  
  const dispositivo = detectarDispositivo();
  if (dispositivo === "Android") {
    window.location.href = `intent:${canal.stream}#Intent;type=video/*;action=android.intent.action.VIEW;end;`;
    return;
  }

  cleanPlayer();
  modalVideo = document.getElementById('modalVideo');

  setTimeout(() => {
    playStreamWithHLS(canal.stream);

    document.getElementById('currentChannelLabel').textContent = `Estas viendo: ${canal.nombre}`;
    const prev = (selectedChannelIndex - 1 + channels.length) % channels.length;
    const next = (selectedChannelIndex + 1) % channels.length;
    document.getElementById('prevChannelInfo').textContent = `Anterior: ${channels[prev]?.nombre || 'Ningún canal'}`;
    document.getElementById('nextChannelInfo').textContent = `Siguiente: ${channels[next]?.nombre || 'Ningún canal'}`;

    updateChannelFocus();
    resetInactivityTimer();

    modalVideo.addEventListener('error', handleVideoError);
    modalVideo.addEventListener('pause', handleVideoPause);
    modalVideo.addEventListener('ended', handleVideoEnded);
  }, 100);
}

// ==================== MANEJO DE ERRORES ====================
function handleVideoError() { 
  console.log('Error en video, reintentando...');
  restartChannel(); 
}

function handleVideoPause() { 
  if (modalVideo && modalVideo.readyState === 0) {
    restartChannel(); 
  }
}

function handleVideoEnded() { 
  restartChannel(); 
}

function restartChannel() {
  if (playingChannelIndex === -1 || !channels[playingChannelIndex]) {
    console.warn("No hay canal en reproducción para reiniciar.");
    return;
  }

  if (retryCount >= MAX_RETRIES) {
    console.warn('Máximo de reintentos alcanzado');
    retryCount = 0;
    return;
  }

  retryCount++;
  const canal = channels[playingChannelIndex];
  
  if (hls && isHLSActive) {
    const conversionResult = convertToOptimalFormat(canal.stream);
    hls.loadSource(conversionResult.url);
  } else {
    playStreamWithHLS(canal.stream);
  }
  
  clearTimeout(retryTimeout);
  retryTimeout = setTimeout(() => { retryCount = 0; }, 30000);
}

// ==================== TIMERS DE UI ====================
function resetInactivityTimer() {
  if (detectarDispositivo() === "Android") return;
  sidebar.classList.remove('hidden');
  clearTimeout(inactivityTimeout);
  inactivityTimeout = setTimeout(() => sidebar.classList.add('hidden'), 4000);
}

function resetUITimer() {
  showUIElements();
  clearTimeout(uiTimeout);
  uiTimeout = setTimeout(hideUIElements, 4000);
}

function isSmallScreen() {
  return window.matchMedia("(max-width: 768px)").matches;
}

function showUIElements() {
  document.getElementById("controlHelpOverlay")?.classList.remove("hidden-ui");
  document.getElementById("currentChannelInfo")?.classList.remove("hidden-ui");
  document.getElementById("listaSelector")?.classList.remove("hidden-ui");
  document.getElementById("listButtons")?.classList.remove("hidden-ui");
  document.getElementById("sidebarSearchInput").style.display = 'block';

  if (isSmallScreen()) {
    sidebar.classList.remove("hidden");
    sidebar.style.opacity = "1";
    sidebar.style.pointerEvents = "auto";
  }
}

function hideUIElements() {
  if (!isSmallScreen()) {
    document.getElementById("controlHelpOverlay")?.classList.add("hidden-ui");
    document.getElementById("currentChannelInfo")?.classList.add("hidden-ui");
    document.getElementById("listButtons")?.classList.add("hidden-ui");
    document.getElementById("listaSelector")?.classList.add("hidden-ui");
    sidebar.classList.add("hidden");
  }
}

// ==================== BOTONES DE LISTAS ====================
function obtenerParametro(nombre) {
  const params = new URLSearchParams(window.location.search);
  return params.get(nombre);
}

function poblarBotonesDeListas() {
  const listButtonsContainer = document.getElementById('listButtons');
  listButtonsContainer.innerHTML = '';
  
  for (const clave in listasDisponibles) {
    const btn = document.createElement('button');
    btn.classList.add('list-button');
    btn.textContent = clave.toUpperCase();
    btn.dataset.lista = clave;

    btn.addEventListener('click', function () {
      const nuevaLista = this.dataset.lista;
      
      showReloadIndicator();
      if (modalVideo && modalVideo.parentNode) {
        cleanPlayer();
      }
      
      localStorage.setItem('servidor45', nuevaLista);
      document.querySelectorAll('.list-button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      
      playingChannelIndex = -1;
      selectedChannelIndex = 0;
      
      conversionStats = { total: 0, tsToM3u8: 0, addedLive: 0, addedM3u8: 0, addedLiveAndM3u8: 0 };
      
      setTimeout(() => {
        const nuevaUrl = listasDisponibles[nuevaLista];
        if (nuevaUrl) {
          loadChannelsAuto(nuevaUrl).then(() => {
            hideReloadIndicator();
            showConversionCounter();
          });
        }
      }, 300);
    });

    listButtonsContainer.appendChild(btn);
  }

  const inicial = obtenerParametro('list') || localStorage.getItem('servidor45') || Object.keys(listasDisponibles)[0] || 'servidor45';
  document.querySelector(`.list-button[data-lista="${inicial}"]`)?.classList.add('active');
}

function showReloadIndicator() {
  const indicator = document.getElementById('reloadIndicator');
  if (indicator) {
    indicator.style.display = 'block';
  }
}

function hideReloadIndicator() {
  const indicator = document.getElementById('reloadIndicator');
  if (indicator) {
    setTimeout(() => { indicator.style.display = 'none'; }, 500);
  }
}

// ==================== BÚSQUEDA ====================
searchInput.addEventListener('keyup', function(e) {
  const filtro = e.target.value.toLowerCase();
  const items = document.querySelectorAll('.channel-item');
  items.forEach(item => {
    const canalName = item.textContent.toLowerCase();
    item.style.display = canalName.includes(filtro) ? 'block' : 'none';
  });
  const visibles = Array.from(document.querySelectorAll('.channel-item')).filter(i => i.style.display !== 'none');
  if (visibles.length > 0) {
    selectedChannelIndex = parseInt(visibles[0].dataset.index);
    updateChannelFocus();
  }
  resetInactivityTimer();
});

searchInput.addEventListener('keydown', function(e) {
  const visibles = Array.from(document.querySelectorAll('.channel-item')).filter(i => i.style.display !== 'none');
  if (visibles.length === 0) return;
  if (e.key === 'ArrowDown') {
    selectedChannelIndex = parseInt(visibles[0].dataset.index);
    updateChannelFocus();
    e.preventDefault();
    searchInput.blur();
  } else if (e.key === 'ArrowUp') {
    selectedChannelIndex = parseInt(visibles[visibles.length - 1].dataset.index);
    updateChannelFocus();
    e.preventDefault();
    searchInput.blur();
  }
});

// ==================== EVENTOS DE TECLADO ====================
document.addEventListener('keydown', (e) => {
  resetUITimer();
  const visibles = Array.from(document.querySelectorAll('.channel-item')).filter(i => i.style.display !== 'none');
  if (visibles.length === 0) return;
  const isSearchFocused = document.activeElement === searchInput;

  switch (e.keyCode) {
    case 403: // 🔴 Rojo - Cerrar/Abrir sidebar
      if (sidebar.classList.contains("hidden")) {
        sidebar.classList.remove("hidden");
        sidebar.style.opacity = "1";
        sidebar.style.pointerEvents = "auto";
        document.getElementById('listButtons').style.display = 'flex';
        resetInactivityTimer();
      } else {
        sidebar.classList.add("hidden");
        sidebar.style.opacity = "";
        sidebar.style.pointerEvents = "";
        document.getElementById('listButtons').style.display = 'none';
        if (inactivityTimeout) clearTimeout(inactivityTimeout);
      }
      e.preventDefault();
      break;
    case 404: // 🟢 Verde - Abrir buscador
      if (!sidebar.classList.contains("hidden")) {
        searchInput.value = "";
        searchInput.focus();
      } else {
        sidebar.classList.remove("hidden");
      }
      e.preventDefault();
      break;
    case 405: // 🟡 Amarillo - Canal siguiente
    case 33:  // Page Up
      selectedChannelIndex = (selectedChannelIndex + 1) % channels.length;
      activateChannel();
      e.preventDefault();
      break;
    case 406: // 🔵 Azul - Canal anterior
    case 34:  // Page Down
      selectedChannelIndex = (selectedChannelIndex - 1 + channels.length) % channels.length;
      activateChannel();
      e.preventDefault();
      break;
    case 48: // 0 - Cambiar lista
      e.preventDefault();
      const listButtons = Array.from(document.querySelectorAll('.list-button'));
      if (listButtons.length > 0) {
        const currentIndex = listButtons.findIndex(btn => btn.classList.contains('active'));
        const nextIndex = (currentIndex + 1) % listButtons.length;
        listButtons[nextIndex].click();
      }
      if (sidebar.classList.contains("hidden")) {
        sidebar.classList.remove("hidden");
        sidebar.style.opacity = "1";
        sidebar.style.pointerEvents = "auto";
        document.getElementById('listButtons').style.display = 'flex';
        resetInactivityTimer();
      }
      break;
  }

  if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && sidebar.classList.contains("hidden")) {
    sidebar.classList.remove("hidden");
    resetInactivityTimer();
  }

  if (isSearchFocused && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
    const index = e.key === 'ArrowDown' ? 0 : visibles.length - 1;
    selectedChannelIndex = parseInt(visibles[index].dataset.index);
    updateChannelFocus();
    e.preventDefault();
    return;
  }

  if (e.key === 'ArrowDown') {
    let pos = visibles.findIndex(i => parseInt(i.dataset.index) === selectedChannelIndex);
    pos = (pos + 1) % visibles.length;
    selectedChannelIndex = parseInt(visibles[pos].dataset.index);
    updateChannelFocus();
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    let pos = visibles.findIndex(i => parseInt(i.dataset.index) === selectedChannelIndex);
    pos = (pos - 1 + visibles.length) % visibles.length;
    selectedChannelIndex = parseInt(visibles[pos].dataset.index);
    updateChannelFocus();
    e.preventDefault();
  } else if (e.key === 'Enter' || e.key === 'OK') {
    activateChannel();
    e.preventDefault();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.keyCode === 49) {
    const listaSelector = document.getElementById('listaSelector');
    listaSelector.focus();
    e.preventDefault();
  }
});

function handleUserActivity() {
  resetUITimer();
  if (sidebar.classList.contains("hidden")) {
    sidebar.classList.remove("hidden");
    sidebar.style.opacity = "1";
    sidebar.style.pointerEvents = "auto";
  }
  resetInactivityTimer();
}

['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(evt => 
  document.addEventListener(evt, handleUserActivity)
);

// ==================== INICIALIZACIÓN ====================
document.addEventListener('DOMContentLoaded', async () => {
  // Cargar listas desde el Worker
  const exito = await cargarListasDesdeWorker();
  
  if (!exito) {
    alert('Error al cargar las listas. Verifica tu conexión.');
    return;
  }
  
  poblarBotonesDeListas();
  
  const listKey = obtenerParametro('list') || localStorage.getItem('servidor45') || Object.keys(listasDisponibles)[0];
  const url = listasDisponibles[listKey];
  
  if (url) {
    showReloadIndicator();
    await loadChannelsAuto(url);
    hideReloadIndicator();
  }
  
  resetUITimer();
  showUIElements();
  
  if (detectarDispositivo() !== "Android") resetInactivityTimer();
  
  if (detectarDispositivo() === "Android") {
    const selector = document.getElementById("listaSelector");
    if (selector) {
      selector.style.fontSize = "16px";
      selector.style.padding = "8px";
      selector.style.width = "40%";
      selector.style.position = "absolute";
      selector.style.top = "0px";
      selector.style.left = "60%";
    }
  }
});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamPlay · M3U</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { background: #07080D; color: #EEEEF4; font-family: 'Figtree', sans-serif; display: flex; flex-direction: column; }

header { display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 52px; background: #0C0E16; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; z-index: 10; }
.logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: #EEEEF4; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.logo-icon { width: 22px; height: 22px; background: #7C3AED; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 11px; height: 11px; }
.url-form { display: flex; align-items: center; gap: 7px; flex: 1; max-width: 540px; margin: 0 auto; }
.url-input { flex: 1; background: #12141F; border: 1px solid rgba(255,255,255,0.09); border-radius: 7px; padding: 8px 12px; font-family: 'Figtree', sans-serif; font-size: 12px; color: #EEEEF4; outline: none; }
.url-input::placeholder { color: #3A3A52; }
.url-input:focus { border-color: #9B72F5; }
.hdr-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 7px; border: none; font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
.hdr-btn-primary { background: #7C3AED; color: #fff; }
.hdr-btn-primary:hover { background: #9B72F5; }
.hdr-btn-ghost { background: #12141F; color: #7878A0; border: 1px solid rgba(255,255,255,0.09); }
.hdr-btn-config { background: #1E293B; color: #94A3B8; border: 1px solid #334155; }
.hdr-btn-config:hover { background: #2D3A4E; color: #CBD5E1; }
input[type="file"] { display: none; }
.hdr-stats { margin-left: auto; font-size: 11px; color: #3A3A52; white-space: nowrap; }
.hdr-stats b { color: #9B72F5; }

.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 30%; min-width: 280px; background: #0C0E16; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s ease; z-index: 5; }
body.immersive .sidebar { transform: translateX(-100%); width: 0; min-width: 0; }
body.immersive .now-playing { opacity: 0; pointer-events: none; }

.player-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; min-width: 0; }
.video-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
.no-channel { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; color: #3A3A52; z-index: 10; background: #000; }
.no-channel svg { opacity: 0.07; }

.sidebar-top { padding: 12px 12px 0; flex-shrink: 0; }
.search-wrap { position: relative; }
.search-wrap .s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #3A3A52; width: 14px; height: 14px; }
.search-input { width: 100%; background: #12141F; border: 1px solid rgba(255,255,255,0.05); border-radius: 7px; padding: 8px 10px 8px 32px; font-family: 'Figtree', sans-serif; font-size: 12px; color: #EEEEF4; outline: none; }
.search-input:focus { border-color: #9B72F5; }

.content-type-buttons { display: flex; gap: 8px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0C0E16; }
.content-btn { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.09); background: #12141F; color: #7878A0; font-family: 'Figtree', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.content-btn.active { background: rgba(124,58,237,0.14); border-color: #9B72F5; color: #9B72F5; }

.cats-wrap { display: flex; gap: 6px; overflow-x: auto; padding: 10px 12px 8px; flex-shrink: 0; scrollbar-width: none; }
.cats-wrap::-webkit-scrollbar { display: none; }
.cat-pill { padding: 4px 11px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.09); background: #12141F; color: #7878A0; font-size: 11px; white-space: nowrap; cursor: pointer; }
.cat-pill.active { background: rgba(124,58,237,0.14); border-color: #9B72F5; color: #9B72F5; }
.cat-pill.focused { outline: 2px solid #9B72F5; outline-offset: 2px; }

.ch-list-wrap { flex: 1; overflow-y: auto; position: relative; }
.ch-list-wrap::-webkit-scrollbar { width: 3px; }
.ch-list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 2px; }
.ch-list-inner { position: relative; }
.channel-item { position: absolute; left: 0; right: 0; height: 58px; display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
.channel-item:hover { background: #12141F; }
.channel-item.active { background: rgba(124,58,237,0.14); border-left: 2px solid #9B72F5; }
.channel-item.focused { background: #181B29; outline: 1px solid #9B72F5; outline-offset: -1px; }
.ch-logo-wrap { width: 36px; height: 36px; border-radius: 7px; background: #12141F; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.ch-logo { width: 100%; height: 100%; object-fit: contain; }
.ch-ph { color: #3A3A52; font-size: 15px; }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 12.5px; font-weight: 500; color: #EEEEF4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-badge { font-size: 10px; color: #3A3A52; flex-shrink: 0; }

/* Estilos para carpetas y estructura de series */
.folder-item { background: rgba(124,58,237,0.08); }
.folder-item .ch-name { color: #9B72F5; font-weight: 600; }
.folder-item .ch-ph { font-size: 18px; }

/* Breadcrumb */
.breadcrumb { display: none; align-items: center; gap: 2px; overflow: hidden; padding: 5px 12px; border-bottom: 1px solid var(--border); background: rgba(124,58,237,0.04); flex-shrink: 0; }
.breadcrumb.on { display: flex; }
.bc-item { font-size: 10.5px; color: #7878A0; cursor: pointer; padding: 2px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 86px; }
.bc-item:hover { color: #9B72F5; background: rgba(124,58,237,0.14); }
.bc-sep { color: #3A3A52; font-size: 9px; }

.now-playing { display: flex; align-items: center; gap: 12px; padding: 0 14px; height: 62px; background: #0C0E16; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; transition: opacity 0.3s ease; }
.live-badge { display: flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; opacity: 0; }
.live-badge.on { opacity: 1; border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.08); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #EF4444; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.live-text { font-size: 10px; font-weight: 700; color: #EF4444; }
.np-info { flex: 1; min-width: 0; }
.np-name { font-size: 13px; font-weight: 600; color: #EEEEF4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-meta { font-size: 10.5px; color: #7878A0; }
.controls { display: flex; gap: 4px; }
.ctrl-btn { width: 36px; height: 36px; border-radius: 7px; background: #12141F; border: 1px solid rgba(255,255,255,0.05); color: #7878A0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.ctrl-btn.play-btn { width: 40px; background: #7C3AED; border-color: transparent; color: #fff; }
.vol-wrap { display: flex; align-items: center; gap: 7px; }
.vol-slider { width: 72px; height: 3px; }

.loader-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 5; }
.loader-overlay.hidden { display: none; }
.spinner { width: 38px; height: 38px; border: 3px solid rgba(255,255,255,0.07); border-top-color: #9B72F5; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.82); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; gap: 10px; }
.error-overlay.hidden { display: none; }
.error-overlay p { color: #EF4444; }
.error-overlay small { color: #7878A0; }
.retry-btn { padding: 8px 22px; background: #7C3AED; border: none; border-radius: 7px; color: #fff; cursor: pointer; }

#vodControls { position: absolute; bottom: 70px; left: 0; right: 0; background: rgba(0,0,0,0.85); padding: 8px 16px; z-index: 20; transition: opacity 0.3s; }
#vodControls.hidden { display: none; }

#toast { position: fixed; bottom: 74px; right: 16px; background: #12141F; border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; padding: 10px 16px; font-size: 12px; z-index: 100; transform: translateY(8px); opacity: 0; transition: all 0.2s; }
#toast.show { opacity: 1; transform: translateY(0); }
#toast.error { border-color: #EF4444; color: #EF4444; }
#toast.success { border-color: #22C55E; color: #22C55E; }

.immersive-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 200; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.09); border-radius: 30px; padding: 8px 16px; color: white; font-size: 12px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; }

/* MODAL CONFIGURACIÓN */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-content { background: #0C0E16; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
.modal-content h3 { margin-bottom: 20px; color: #9B72F5; }
.modal-content input { width: 100%; padding: 10px 12px; margin-bottom: 12px; background: #12141F; border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; color: white; font-size: 14px; }
.modal-content input:focus { outline: none; border-color: #9B72F5; }
.modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
.modal-buttons button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
.btn-save { background: #7C3AED; color: white; }
.btn-cancel { background: #2D3A4E; color: #94A3B8; }
.config-list { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; }
.config-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #12141F; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
.config-item:hover { background: #1E293B; }
.config-item .name { font-size: 12px; color: #9B72F5; }
.config-item .server { font-size: 10px; color: #7878A0; }
.config-item .delete { background: none; border: none; color: #EF4444; cursor: pointer; font-size: 16px; padding: 4px 8px; }
.config-item .delete:hover { color: #FF6B6B; }
</style>
</head>
<body>
<div id="loadbar" style="position:fixed;top:0;left:0;height:2px;width:0;background:#7C3AED;z-index:200;transition:width .3s"></div>

<header>
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>StreamPlay</div>
  <div class="url-form">
    <input class="url-input" id="urlInput" type="text" placeholder="URL de lista M3U">
    <button class="hdr-btn hdr-btn-primary" id="loadBtn">Cargar</button>
    <label class="hdr-btn hdr-btn-ghost" for="fileInput">📁 Archivo</label>
    <input type="file" id="fileInput" accept=".m3u,.m3u8,.txt">
    <button class="hdr-btn hdr-btn-config" id="configBtn">⚙️ Xtream</button>
  </div>
  <div class="hdr-stats" id="stats"></div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" placeholder="Buscar...">
      </div>
    </div>
    <div class="content-type-buttons">
      <button class="content-btn" data-type="channels">📺 CANALES</button>
      <button class="content-btn" data-type="movies">🎬 PELÍCULAS</button>
      <button class="content-btn" data-type="series">📺 SERIES</button>
    </div>
    <div class="cats-wrap" id="catsWrap"></div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="ch-list-wrap" id="chListWrap">
      <div class="ch-list-inner" id="chListInner"></div>
    </div>
  </div>

  <div class="player-area">
    <div class="video-wrap" id="videoWrap">
      <div class="no-channel" id="noChannel">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <p>SELECCIONA UN CANAL</p>
      </div>
      <video id="videoEl" class="video-js vjs-default-skin" playsinline style="width:100%;height:100%;position:absolute"></video>
      <div class="loader-overlay hidden" id="loaderOverlay"><div class="spinner"></div></div>
      <div class="error-overlay hidden" id="errorOverlay">
        <p id="errorMsg">Error</p>
        <small id="errorSub">Verifica la URL</small>
        <button class="retry-btn" id="retryBtn">Reintentar</button>
      </div>
    </div>

    <div class="now-playing">
      <div class="live-badge" id="liveBadge"><div class="live-dot"></div><span class="live-text">EN VIVO</span></div>
      <div class="np-info"><div class="np-name" id="npName">Sin reproducción</div><div class="np-meta" id="npMeta">—</div></div>
      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Anterior">◀◀</button>
        <button class="ctrl-btn play-btn" id="playBtn" title="Play">▶</button>
        <button class="ctrl-btn" id="nextBtn" title="Siguiente">▶▶</button>
        <div class="vol-wrap">
          <button class="vol-btn" id="volBtn">🔊</button>
          <input type="range" class="vol-slider" id="volRange" min="0" max="1" step="0.05" value="1">
        </div>
        <button class="ctrl-btn" id="copyLinkBtn" title="Copiar enlace">📋</button>
        <button class="ctrl-btn" id="fsBtn" title="Pantalla completa">⛶</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<button class="immersive-toggle" id="immersiveToggle">🎬 Modo Inmersivo</button>

<!-- MODAL CONFIGURACIÓN XTREAM -->
<div id="configModal" class="modal">
  <div class="modal-content">
    <h3>Configuración Xtream Codes</h3>
    <input type="text" id="xtreamServer" placeholder="Servidor (ej: avefenixtv.com)">
    <input type="text" id="xtreamUser" placeholder="Usuario">
    <input type="password" id="xtreamPass" placeholder="Contraseña">
    <div class="modal-buttons">
      <button class="btn-save" id="saveXtreamBtn">Guardar y Cargar</button>
      <button class="btn-cancel" id="cancelModalBtn">Cancelar</button>
    </div>
    <div class="config-list" id="configList">
      <h4 style="font-size:12px; margin-bottom:8px; color:#7878A0;">Configuraciones guardadas:</h4>
      <div id="savedConfigs"></div>
    </div>
  </div>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
const DEFAULT_SERVER = 'avefenixtv.com';
const DEFAULT_USER = 'rey_estrada';
const DEFAULT_PASS = 'Estrada2022R';

// ==================== BASE DE CONOCIMIENTO PARA CLASIFICACIÓN ====================
const KNOWLEDGE_BASE = {
    channelKeywords: ['canal', 'channel', 'tv', 'en vivo', 'live', 'hd', 'fhd', '4k', 'deportes', 'sports', 'noticias', 'news', 'entretenimiento', 'musica', 'music', 'infantil', 'kids', '24/7'],
    movieKeywords: ['pelicula', 'movie', 'film', 'cine', 'estreno', 'accion', 'aventura', 'comedia', 'drama', 'terror', 'suspenso', 'romance', 'animacion', 'ciencia ficcion', 'fantasia', 'belico', 'crimen', 'musical', 'western'],
    seriesKeywords: ['serie', 'series', 'temporada', 'capitulo', 'episodio', 'season', 'episode', 's01', 's02', 's03', 's04', 's05', 'temp'],
    movieGroups: ['cine', 'movie', 'peliculas', 'estrenos', 'cinema', 'film', '4k', 'uhd', 'action', 'adventure', 'comedy', 'crime', 'drama', 'fantasy', 'horror', 'thriller', 'western', 'animation', 'documentaries', 'family', 'music', 'romantic', 'war', 'tv movie'],
    channelGroups: [
        'canales', 'channels', 'tv', 'deportes', 'noticias', 'musica', 'infantil',
        // Grupos de CANALES que están siendo mal clasificados
        'vix', '24/7', 'argentina', 'brasil', 'canada', 'costa rica', 'francia', 'france', 'chile', '24/7 - dibujos animados-n',  '24/7 - series y reality-n', '24/7 - temporal',
        'alemania', 'germany', 'honduras', 'israel', 'italy', 'mexico', 'peru', 'portugal',
        'uk', 'usa', 'eeuu', 'ee.uu', 'europa', 'asia', 'africa', 'latino', 'latam',
        'deportes', 'sports', 'noticias', 'news', 'entretenimiento', 'entertainment',
        'cultura', 'religion', 'radio', 'musica', 'music', 'infantil', 'kids',
        'documentales', 'documentary', 'realities', 'reality', 'sec+', 'dazn',
        'cine box', 'cine premium', 'extra cine', 'cine y series españa',
        '24/7 brasil', '24/7 temporal', '24/7 dibujos animados', '24/7 peliculas'
    ]
};

// ==================== CLASIFICACIÓN INTELIGENTE ====================
function clasificarInteligente(canal) {
    var url = (canal.url || '').toLowerCase();
    var name = (canal.name || '').toLowerCase();
    var group = (canal.group || '').toLowerCase();
    
    if (url.includes('/movie/')) return 'movies';
    if (url.includes('/series/')) return 'series';
    if (url.match(/\.(mkv|mp4|avi|mov|webm)$/i)) {
        if (name.match(/s\d{1,2}e\d{1,2}/i) || name.match(/temporada|capítulo|episodio/i)) return 'series';
        return 'movies';
    }
    if (name.match(/s\d{1,2}e\d{1,2}/i) || name.match(/temporada|capítulo|episodio/i)) return 'series';
    
    for (var mg of KNOWLEDGE_BASE.movieGroups) {
        if (group.includes(mg) || name.includes(mg)) return 'movies';
    }
    for (var sk of KNOWLEDGE_BASE.seriesKeywords) {
        if (name.includes(sk)) return 'series';
    }
    for (var mk of KNOWLEDGE_BASE.movieKeywords) {
        if (name.includes(mk)) return 'movies';
    }
    return 'channels';
}

function esVod(ch) { return ch.tipo === 'movies' || ch.tipo === 'series'; }

// ==================== EXTRACCIÓN DE INFO DE SERIES ====================
function extraerInfoSerie(nombre) {
    var name = nombre.toLowerCase();
    var match = name.match(/(.+?)\s*s(\d{1,2})e(\d{1,2})/i);
    if (match) return { nombre: match[1].trim(), temporada: parseInt(match[2]), capitulo: parseInt(match[3]) };
    match = name.match(/(.+?)\s*(\d+)x(\d+)/i);
    if (match) return { nombre: match[1].trim(), temporada: parseInt(match[2]), capitulo: parseInt(match[3]) };
    match = name.match(/(.+?)\s*temporada\s*(\d+)\s*cap[ií]tulo\s*(\d+)/i);
    if (match) return { nombre: match[1].trim(), temporada: parseInt(match[2]), capitulo: parseInt(match[3]) };
    return null;
}

function limpiarNombreSerie(nombre) {
    var name = nombre.toLowerCase();
    name = name.replace(/s\d{1,2}e\d{1,2}/i, '');
    name = name.replace(/\d+x\d+/i, '');
    name = name.replace(/temporada\s*\d+/i, '');
    name = name.replace(/cap[ií]tulo\s*\d+/i, '');
    name = name.replace(/episodio\s*\d+/i, '');
    name = name.replace(/[\(\)\[\]]/g, '');
    return name.trim().split(' ').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
}

// ==================== AGRUPACIÓN DE SERIES ====================
function agruparSeries(items) {
    var seriesMap = {};
    items.forEach(item => {
        var info = extraerInfoSerie(item.name);
        var nombreSerie = info ? info.nombre : limpiarNombreSerie(item.name);
        if (!nombreSerie) nombreSerie = item.name;
        
        if (!seriesMap[nombreSerie]) {
            seriesMap[nombreSerie] = {
                nombre: nombreSerie,
                temporadas: {},
                logo: item.logo,
                grupo: item.group,
                tipo: 'series',
                esCarpeta: true
            };
        }
        if (info && info.temporada) {
            if (!seriesMap[nombreSerie].temporadas[info.temporada]) {
                seriesMap[nombreSerie].temporadas[info.temporada] = {
                    numero: info.temporada,
                    capitulos: []
                };
            }
            seriesMap[nombreSerie].temporadas[info.temporada].capitulos.push({
                numero: info.capitulo,
                nombre: item.name,
                url: item.url,
                logo: item.logo
            });
        } else {
            if (!seriesMap[nombreSerie].temporadas[0]) {
                seriesMap[nombreSerie].temporadas[0] = { numero: 0, capitulos: [] };
            }
            seriesMap[nombreSerie].temporadas[0].capitulos.push({
                numero: seriesMap[nombreSerie].temporadas[0].capitulos.length + 1,
                nombre: item.name,
                url: item.url,
                logo: item.logo
            });
        }
    });
    
    var seriesList = [];
    for (var key in seriesMap) {
        var serie = seriesMap[key];
        var tempsArray = [];
        for (var t in serie.temporadas) {
            var temp = serie.temporadas[t];
            temp.capitulos.sort((a,b) => a.numero - b.numero);
            tempsArray.push(temp);
        }
        tempsArray.sort((a,b) => a.numero - b.numero);
        serie.temporadas = tempsArray;
        seriesList.push(serie);
    }
    seriesList.sort((a,b) => a.nombre.localeCompare(b.nombre));
    return seriesList;
}

// ==================== MONITOR DE RECONEXIÓN ====================
function detenerMonitor() { if(reconectarTimeout){ clearInterval(reconectarTimeout); reconectarTimeout=null; } intentosReconexion=0; }

function iniciarMonitor(video, urlOriginal, tipo, esVodContent) {
  detenerMonitor();
  if(esVodContent) return;
  intentosReconexion=0;
  reconectarTimeout = setInterval(function(){
    if(!video || video.paused || video.ended) return;
    var tiempoActual = video.currentTime || 0;
    var buffer = video.buffered;
    var bufferFin = (buffer.length > 0) ? buffer.end(buffer.length - 1) : 0;
    var sinBuffer = (buffer.length === 0 || (bufferFin - tiempoActual < 0.5));
    var congelado = (video.lastCurrentTime !== undefined && video.lastCurrentTime === tiempoActual && tiempoActual > 0);
    video.lastCurrentTime = tiempoActual;
    if((congelado || sinBuffer) && intentosReconexion < MAX_INTENTOS && tiempoActual > 0){
      intentosReconexion++;
      toast(`Reconectando (${intentosReconexion})`,'');
      if(tipo==='hls' && hls){ hls.destroy(); hls=null; setTimeout(()=>{ if(currentCh) playVideoHls(currentCh, activeIdx); },1000); }
      else if(tipo==='directo'){ var nuevaUrl = urlOriginal + (urlOriginal.includes('?')?'&_=':'?_=')+Date.now(); video.src=nuevaUrl; video.load(); video.play().catch(e=>{}); }
    }
  },8000);
}

  if(currentPlayPromise){ currentPlayPromise.catch(e=>{}); currentPlayPromise=null; }
  var v = document.getElementById('videoEl');

function playVideoDirecto(ch, idx) {
  stopPlayback();

  if(vod){ agregarVOD(); setLive(false); } else { quitarVOD(); setLive(true); }
  var errHandler = function(){ v.removeEventListener('error',errHandler); hideLoader(); showError('No se puede reproducir','Copia el enlace para VLC'); setLive(false); detenerMonitor(); };
  v.addEventListener('error',errHandler);
  v.src = ch.url;
  v.load();
  currentPlayPromise = v.play();
  currentPlayPromise.then(()=>{ hideLoader(); iniciarMonitor(v, ch.url, 'directo', vod); currentPlayPromise=null; }).catch(e=>{ v.removeEventListener('error',errHandler); hideLoader(); showError('Error',e.message); currentPlayPromise=null; });

function playVideoHls(ch, idx) {
  stopPlayback();

  if(Hls.isSupported()){
    hls = new Hls({ enableWorker:false });
    hls.loadSource(ch.url);
    hls.attachMedia(v);
    var to = setTimeout(()=>{ if(hls){ hls.destroy(); hls=null; playVideoDirecto(ch,idx); } },10000);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{ clearTimeout(to); currentPlayPromise=v.play(); currentPlayPromise.then(()=>{ hideLoader(); iniciarMonitor(v,ch.url,'hls',false); currentPlayPromise=null; }).catch(e=>{ hideLoader(); currentPlayPromise=null; }); });
    hls.on(Hls.Events.ERROR,(e,d)=>{ if(d.fatal && d.type!==Hls.ErrorTypes.NETWORK_ERROR){ clearTimeout(to); if(hls){ hls.destroy(); hls=null; } playVideoDirecto(ch,idx); } });
  } else { playVideoDirecto(ch,idx); }
}

function scrollElementoAlCentro(elemento, contenedor) {
  if(!elemento || !contenedor) return;
  var contRect = contenedor.getBoundingClientRect();
  var elRect = elemento.getBoundingClientRect();
  var offset = elRect.top - contRect.top;
  var targetScroll = contenedor.scrollTop + offset - (contRect.height / 2) + (elRect.height / 2);
  contenedor.scrollTo({ top: Math.max(0, targetScroll), behavior: 'smooth' });
}

function navigateBackFromSeries() {
  if (navStack.length === 0) return;
  
  var lastState = navStack.pop();
  
  if (navStack.length === 0) {
    // Volver a la lista principal de series
    seriesStructure = agruparSeries(channelsAll.filter(ch => ch.tipo === 'series'));
    channels = seriesStructure.map((serie, idx) => ({ ...serie, _origIdx: idx }));
    activeIdx = -1;
    renderList();
    renderBreadcrumb();
  } else if (navStack[navStack.length - 1].type === 'series') {
    // Volver a temporadas desde capítulos
    var serieState = navStack[navStack.length - 1];
    mostrarTemporadas(serieState.data);
  } else {
    // Recuperar estado anterior
    var prevState = navStack[navStack.length - 1];
    channels = prevState.channels;
    activeIdx = prevState.activeIdx;
    renderList();
    renderBreadcrumb();
  }
}

function renderBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  if (navStack.length === 0) { 
    bc.classList.remove('on'); 
    bc.innerHTML = ''; 
    return; 
  }
  bc.classList.add('on');
  var html = '<span class="bc-item" data-d="-1">⌂ Series</span>';
  navStack.forEach((f, i) => {
    html += '<span class="bc-sep">›</span><span class="bc-item" data-d="' + i + '">' + esc(f.name) + '</span>';
  });
  bc.innerHTML = html;
  bc.querySelectorAll('.bc-item').forEach(el => {
    el.addEventListener('click', (e) => {
      var depth = parseInt(el.dataset.d, 10);
      if (depth === -1) {
        // Volver al inicio de series
        while (navStack.length > 0) navStack.pop();
        seriesStructure = agruparSeries(channelsAll.filter(ch => ch.tipo === 'series'));
        channels = seriesStructure.map((serie, idx) => ({ ...serie, _origIdx: idx }));
        activeIdx = -1;
        renderList();
        renderBreadcrumb();
      } else {
        // Volver a un nivel específico
        while (navStack.length > depth + 1) navStack.pop();
        navigateBackFromSeries();
      }
    });
  });
}

// ==================== RESOLVER CANAL / CARPETA ====================
function resolveChannel(origIdx) {
  registrarActividad();
  var item = channels[origIdx];
  if (!item) return;
  
  if (item.esCarpeta && item.temporadas) {
    mostrarTemporadas(item);
    return;
  }
  
  if (item.esTemporada && item.capitulos) {
    var serieNombre = navStack.length > 0 ? navStack[navStack.length - 1].name : 'Series';
    mostrarCapitulos(item, serieNombre);
    return;
  }
  
  if (item._subList) {
    activeIdx = origIdx;
    navigateTo(item);
    return;
  }
  
  activeIdx = origIdx;
  renderList();
  var url = (item.url || '').toLowerCase();
  var vod = (item.tipo === 'movies' || item.tipo === 'series');
  
  if (vod) playVideoDirecto(item, origIdx);
  else if (url.includes('.m3u8') || url.includes('f=.m3u8')) playVideoHls(item, origIdx);
  else if (url.endsWith('.ts')) { item.url = item.url.replace(/\.ts$/i, '.m3u8'); playVideoHls(item, origIdx); }
  else playVideoDirecto(item, origIdx);
}

// ==================== PARSEO M3U ====================
function parseM3UAsync(text, onProgress, onDone) {
  var lines = text.split('\n'), result = [], cur = null, i=0, total=lines.length, CHUNK=8000;
  function process(){
    var end = Math.min(i+CHUNK, total);
    for(;i<end;i++){
      var line = lines[i].trim();
      if(!line) continue;
      if(line.indexOf('#EXTINF')===0){
        cur = { name:'', group:'', logo:'', url:'' };
        var nm = line.match(/,(.+)$/); if(nm) cur.name = nm[1].trim();
        var lg = line.match(/tvg-logo="([^"]*)"/); if(lg) cur.logo = lg[1];
        var gr = line.match(/group-title="([^"]*)"/); if(gr) cur.group = gr[1];
      } else if(cur && line.charAt(0)!=='#'){
        cur.url = line;
        if(cur.name && cur.url) result.push(cur);
        cur = null;
      }
    }
    if(onProgress) onProgress(Math.round(i/total*100));
    if(i<total) setTimeout(process,0);
    else onDone(result);
  }
  setTimeout(process,0);
}

function isM3U(t){ return t.indexOf('#EXTINF')!==-1; }
function extractText(r){ var s=r.trim(); if(s[0]!=='<') return s; var d=new DOMParser().parseFromString(s,'text/html'); return d.body?(d.body.innerText||d.body.textContent):d.documentElement.textContent; }
function fetchText(u){ return fetch(u).then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); }); }

// ==================== VIRTUAL LIST ====================
function renderVirtual() {
  var wrap = document.getElementById('chListWrap'), inner = document.getElementById('chListInner');
  var wrapH = wrap.clientHeight, scroll = wrap.scrollTop, n = channels.length;
  if(!n) return;
  var start = Math.max(0, Math.floor(scroll/ITEM_H)-10);
  var end = Math.min(n-1, Math.ceil((scroll+wrapH)/ITEM_H)+10);
  var keys = Object.keys(_renderedMap);
  for(var k=0;k<keys.length;k++){ var vi=parseInt(keys[k]); if(vi<start||vi>end){ var el=_renderedMap[vi]; if(el&&el.parentNode) el.parentNode.removeChild(el); delete _renderedMap[vi]; } }
  var frag = document.createDocumentFragment();
  for(var i=start;i<=end;i++){ if(_renderedMap[i]) continue; var c=channels[i]; var div=crearItem(c,i); div.dataset.origIdx = c._origIdx; _renderedMap[i]=div; frag.appendChild(div); }
  inner.appendChild(frag);
}

function crearItem(c, vi){
  var div = document.createElement('div');
  var clases = 'channel-item';
  if (c.esCarpeta) clases += ' folder-item';
  if (c._origIdx === activeIdx) clases += ' active';
  div.className = clases;
  div.style.top = (vi * ITEM_H) + 'px';
  
  var lw = document.createElement('div'); lw.className='ch-logo-wrap';
  if(c.logo){ var img=new Image(); img.className='ch-logo'; img.loading='lazy'; img.src=c.logo; lw.appendChild(img); }
  else lw.innerHTML='<span class="ch-ph">' + (c.esCarpeta ? '📁' : '▶') + '</span>';
  
  var info=document.createElement('div'); info.className='ch-info';
  var displayName = c.nombre || c.name || 'Sin título';
  info.innerHTML='<div class="ch-name">'+esc(displayName)+'</div>';
  if(c.capitulos && c.capitulos.length) {
    info.innerHTML += '<div class="ch-sub">'+c.capitulos.length+' capítulos</div>';
  }
  
  var badge=document.createElement('div'); badge.className='ch-badge';
  badge.textContent=(c._origIdx+1);
  div.appendChild(lw); div.appendChild(info); div.appendChild(badge);
  div.addEventListener('click',()=>resolveChannel(c._origIdx));
  return div;
}

function buildCategoryPills(){
  var groups = {};
  if (currentContentType === 'series' && seriesStructure) {
    seriesStructure.forEach(serie => { if(serie.grupo) groups[serie.grupo] = (groups[serie.grupo] || 0) + 1; });
  } else {
    channelsAll.forEach(ch => { if(ch.tipo === currentContentType && ch.group) { groups[ch.group] = (groups[ch.group] || 0) + 1; } });
  }
  
  var keys = Object.keys(groups).sort();
  var wrap = document.getElementById('catsWrap');
  wrap.innerHTML = '';
  
  function makePill(label, group){
    var p = document.createElement('button');
    p.className = 'cat-pill' + (activeGroup===group?' active':'');
    p.textContent = label;
    p.addEventListener('click',()=>{ 
      activeGroup = (group==='') ? '' : group;
      filtrarPorCategoria();
      buildCategoryPills();
      renderList();
      setTimeout(()=>{ 
        var nuevas = document.querySelectorAll('.cat-pill');
        for(var i=0;i<nuevas.length;i++){ if(nuevas[i].textContent === label){ currentCategoryIndex=i; actualizarFocoCategorias(); break; } }
      },50);
    });
    return p;
  }
  wrap.appendChild(makePill('Todos', ''));
  keys.forEach(g=>wrap.appendChild(makePill(g, g)));
  setTimeout(actualizarFocoCategorias,50);
}

function renderList(){
  var inner = document.getElementById('chListInner');
  inner.innerHTML = '';
  _renderedMap = {};
  if(!channels.length){ inner.style.cssText='height:100%;position:static;'; inner.innerHTML='<div class="empty-state"><p>No hay contenido</p></div>'; document.getElementById('stats').innerHTML=''; return; }
  inner.style.cssText='position:relative;height:'+(channels.length*ITEM_H)+'px;';
  document.getElementById('chListWrap').scrollTop = 0;
  renderVirtual();
  document.getElementById('stats').innerHTML = '<b>'+channels.length+'</b> elementos';
  setTimeout(actualizarFocoLista,50);
}

function cargarXtreamList(){
  showLoadBar();
  toast('Conectando a ' + currentServer + '...');
  fetchText(getM3UUrl()).then(raw=>{
    var text=extractText(raw);
    if(!isM3U(text)) throw new Error('Formato inválido');
    parseM3UAsync(text, pct=>{ document.getElementById('loadbar').style.width=Math.max(70,pct)+'%'; }, list=>{
      hideLoadBar();
      if(!list.length){ toast('No hay canales','error'); return; }
      loadLevel(list);
      toast(list.length+' elementos cargados','success');
    });
  }).catch(e=>{ hideLoadBar(); toast('Error: '+e.message,'error'); console.error(e); });
}

function cargarXtreamPersonalizado(server, user, pass) {
  currentServer = server; currentUser = user; currentPass = pass;
  cargarXtreamList();
  guardarConfiguracion(server, user, pass);
}

function loadFromUrl(url) {
  showLoadBar();
  fetchText(url).then(raw=>{
    var text=extractText(raw);
    if(!isM3U(text)) throw new Error('Formato inválido');
    parseM3UAsync(text, pct=>{ document.getElementById('loadbar').style.width=Math.max(70,pct)+'%'; }, list=>{
      hideLoadBar();
      if(!list.length){ toast('No hay contenido','error'); return; }
      loadLevel(list);
      toast(list.length+' elementos cargados','success');
    });
  }).catch(e=>{ hideLoadBar(); toast('Error: '+e.message,'error'); });
}

// ==================== CONFIGURACIONES GUARDADAS ====================
function loadSavedConfigs() {
    var saved = localStorage.getItem('xtream_configs');
    if (saved) { try { return JSON.parse(saved); } catch(e) { return []; } }
    return [{ id: 'default', name: 'AVE FENIX', server: DEFAULT_SERVER, user: DEFAULT_USER, pass: DEFAULT_PASS, isDefault: true }];
}

function saveConfig(configs) { localStorage.setItem('xtream_configs', JSON.stringify(configs)); }

function renderSavedConfigs() {
    var configs = loadSavedConfigs();
    var container = document.getElementById('savedConfigs');
    if (!container) return;
    container.innerHTML = '';
    configs.forEach((cfg, idx) => {
        var div = document.createElement('div');
        div.className = 'config-item';
        div.innerHTML = `<div style="flex:1"><div class="name">${cfg.name || cfg.server}</div><div class="server">${cfg.server}</div></div><button class="delete" data-idx="${idx}" data-id="${cfg.id}">🗑️</button>`;
        div.addEventListener('click', (e) => { if (!e.target.classList.contains('delete')) cargarConfiguracion(cfg); });
        div.querySelector('.delete').addEventListener('click', (e) => { e.stopPropagation(); eliminarConfiguracion(cfg.id); });
        container.appendChild(div);
    });
}

function guardarConfiguracion(server, user, pass) {
    var configs = loadSavedConfigs();
    configs.unshift({ id: 'cfg_' + Date.now(), name: server.split('.')[0], server: server, user: user, pass: pass, isDefault: false });
    if (configs.length > 10) configs = configs.slice(0, 10);
    saveConfig(configs);
    renderSavedConfigs();
}

function eliminarConfiguracion(id) {
    var configs = loadSavedConfigs();
    configs = configs.filter(cfg => cfg.id !== id);
    saveConfig(configs);
    renderSavedConfigs();
}

function cargarConfiguracion(cfg) {
    currentServer = cfg.server; currentUser = cfg.user; currentPass = cfg.pass;
    document.getElementById('xtreamServer').value = cfg.server;
    document.getElementById('xtreamUser').value = cfg.user;
    document.getElementById('xtreamPass').value = cfg.pass;
    cargarXtreamList();
    document.getElementById('configModal').classList.remove('show');
    toast(`Cargando: ${cfg.name || cfg.server}`, 'success');
}

// ==================== EVENTOS ====================
document.getElementById('loadBtn').addEventListener('click',()=>{ var u=document.getElementById('urlInput').value; if(u) loadFromUrl(u); else cargarXtreamList(); });
document.getElementById('fileInput').addEventListener('change',e=>{ var f=e.target.files[0]; if(!f) return; var r=new FileReader(); r.onload=ev=>{ var text=extractText(ev.target.result); if(!isM3U(text)){ toast('Lista inválida','error'); return; } showLoadBar(); parseM3UAsync(text, pct=>{ document.getElementById('loadbar').style.width=Math.max(70,pct)+'%'; }, list=>{ hideLoadBar(); if(list.length){ navStack=[]; loadLevel(list); toast(list.length+' elementos cargados','success'); } }); }; r.readAsText(f,'utf-8'); e.target.value=''; });
document.getElementById('playBtn').addEventListener('click',()=>{ var v=document.getElementById('videoEl'); if(activeIdx<0) return; if(v.paused){ v.play(); } else { v.pause(); } });
document.getElementById('prevBtn').addEventListener('click',()=>{ var idx=channels.findIndex(c=>c._origIdx===activeIdx); if(idx>0) resolveChannel(channels[idx-1]._origIdx); });
document.getElementById('nextBtn').addEventListener('click',()=>{ var idx=channels.findIndex(c=>c._origIdx===activeIdx); if(idx<channels.length-1) resolveChannel(channels[idx+1]._origIdx); });
document.getElementById('fsBtn').addEventListener('click',()=>{ var w=document.getElementById('videoWrap'); if(!document.fullscreenElement) w.requestFullscreen(); else document.exitFullscreen(); });
document.getElementById('retryBtn').addEventListener('click',()=>{ if(currentCh) playVideoDirecto(currentCh, activeIdx); });
document.getElementById('copyLinkBtn').addEventListener('click',copiarEnlace);
document.getElementById('immersiveToggle').addEventListener('click',toggleInmersivo);
document.querySelectorAll('.content-btn').forEach(btn=>{ btn.addEventListener('click',()=>cambiarTipoContenido(btn.dataset.type)); });
document.getElementById('volRange').addEventListener('input',function(){ document.getElementById('videoEl').volume=this.value; });
document.getElementById('volBtn').addEventListener('click',function(){ var v=document.getElementById('videoEl'); v.muted=!v.muted; });
document.getElementById('searchInput').addEventListener('input',function(){ 
  clearTimeout(_searchTimer); 
  _searchTimer = setTimeout(function(){
    if(!channelsAll.length) return;
    var busqueda = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!busqueda) {
      filtrarPorCategoria();
    } else if (currentContentType === 'series' && seriesStructure && navStack.length === 0) {
      channels = seriesStructure.filter(s => s.nombre.toLowerCase().includes(busqueda));
      channels.forEach((ch, idx) => { ch._origIdx = idx; });
    } else {
      channels = channelsAll.filter(ch => ch.tipo === currentContentType && (!activeGroup || ch.group === activeGroup) && (ch.name.toLowerCase().includes(busqueda) || (ch.group && ch.group.toLowerCase().includes(busqueda))));
      channels.forEach((ch, idx) => { ch._origIdx = idx; });
    }
    renderList();
  }, 220);
});

// MODAL CONFIGURACIÓN
document.getElementById('configBtn').addEventListener('click', () => { renderSavedConfigs(); document.getElementById('configModal').classList.add('show'); });
document.getElementById('cancelModalBtn').addEventListener('click', () => { document.getElementById('configModal').classList.remove('show'); });
document.getElementById('saveXtreamBtn').addEventListener('click', () => {
  var server = document.getElementById('xtreamServer').value.trim();
  var user = document.getElementById('xtreamUser').value.trim();
  var pass = document.getElementById('xtreamPass').value.trim();
  if (!server || !user || !pass) { toast('Completa todos los campos', 'error'); return; }
  cargarXtreamPersonalizado(server, user, pass);
  document.getElementById('configModal').classList.remove('show');
});
document.getElementById('configModal').addEventListener('click', (e) => { if (e.target === document.getElementById('configModal')) document.getElementById('configModal').classList.remove('show'); });

// ==================== TECLADO ====================
document.addEventListener('keydown', function(e) {
  var t = document.activeElement.tagName;
  if(t==='INPUT' || t==='SELECT' || t==='TEXTAREA') return;
  if(e.key==='1'){ e.preventDefault(); cambiarTipoContenido('channels'); return; }
  if(e.key==='2'){ e.preventDefault(); cambiarTipoContenido('movies'); return; }
  if(e.key==='3'){ e.preventDefault(); cambiarTipoContenido('series'); return; }
  if(e.key==='ArrowLeft'){ e.preventDefault(); navegarCategoria(-1); return; }
  if(e.key==='ArrowRight'){ e.preventDefault(); navegarCategoria(1); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); if(channels.length) seleccionarCanal(-1); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); if(channels.length) seleccionarCanal(1); return; }
  if(e.key==='Enter'){ e.preventDefault(); if(activeIdx>=0) resolveChannel(activeIdx); return; }
  if(e.key===' ' || e.key==='k' || e.key==='K'){ e.preventDefault(); document.getElementById('playBtn').click(); return; }
  if(e.key==='n' || e.key==='N'){ e.preventDefault(); document.getElementById('nextBtn').click(); return; }
  if(e.key==='p' || e.key==='P'){ e.preventDefault(); document.getElementById('prevBtn').click(); return; }
  // Tecla de retroceso/volver (Backspace)
  if(e.key==='Backspace' || e.key==='B' || e.key==='b'){ 
    e.preventDefault(); 
    if (currentContentType === 'series' && navStack.length > 0) {
      navigateBackFromSeries();
    } else if (navStack.length) { 
      navigateBack(); 
    }
    return; 
  }
  if(e.key==='f' || e.key==='F'){ e.preventDefault(); document.getElementById('fsBtn').click(); return; }
  if(e.key==='m' || e.key==='M'){ e.preventDefault(); document.getElementById('volBtn').click(); return; }
  if(e.key==='i' || e.key==='I'){ e.preventDefault(); toggleInmersivo(); return; }
});

// ==================== INICIALIZACIÓN ====================
renderList();
renderSavedConfigs();
setTimeout(() => { cargarXtreamList(); }, 500);
</script>
